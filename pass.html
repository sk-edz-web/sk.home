<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Response</title>
  <!-- absolutely no CSS -->
</head>
<body>
<pre>{
  "status": "error",
  "code": 404,
  "message": "page is not found",
  "result": "failed",
  "log": "not loading"
}</pre>
<input type="password" id="passInput" autocomplete="off" autofocus>
<button id="submitBtn">→</button>
<span id="errorMsg" style="color:red;display:none;">Invalid code</span>

<script>
  const CORRECT = '5023';
  const input = document.getElementById('passInput');
  const btn = document.getElementById('submitBtn');
  const error = document.getElementById('errorMsg');

  function login() {
    if (input.value.trim() === CORRECT) {
      sessionStorage.setItem('sk_shop_auth', 'true');
      window.location.href = 'admin.html';
    } else {
      error.style.display = 'inline';
      input.style.border = '1px solid red';
      setTimeout(() => input.style.border = '', 500);
    }
  }

  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); login(); }
  });
  btn.addEventListener('click', login);
</script>
</body>
</html>
