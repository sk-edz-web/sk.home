<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>SK.SHOP · App Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f9fafc; }
    @keyframes cardPop {
      0% { opacity: 0; transform: scale(0.92) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .app-card {
      animation: cardPop 0.3s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
      opacity: 0;
    }
    .hover-lift { transition: all 0.25s ease; }
    .hover-lift:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.12), 0 8px 10px -4px rgba(0, 0, 0, 0.05);
    }
    .line-clamp-2 {
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="antialiased text-gray-800">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 md:py-8">
    
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div class="flex items-center">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">
          <span class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 bg-clip-text text-transparent animate-pulse" style="animation-duration: 4s;">
            SK.SHOP
          </span>
        </h1>
        <span class="ml-3 text-xs font-medium bg-purple-100 text-purple-700 px-2 py-1 rounded-full border border-purple-200">WEB STORE</span>
      </div>
      
      <div class="relative w-full md:w-96 group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 group-focus-within:text-purple-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input type="text" id="searchInput" placeholder="Search apps, categories..." class="w-full pl-12 pr-5 py-3.5 rounded-2xl border border-gray-200/80 bg-white/90 backdrop-blur-sm shadow-sm text-base placeholder:text-gray-400 focus:outline-none focus:ring-4 focus:ring-purple-200/70 focus:border-purple-300 transition-all duration-200" autocomplete="off" />
        <button id="clearSearch" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden">✕</button>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-6">
      <span class="bg-white/80 px-4 py-1.5 rounded-full text-sm font-medium text-gray-700 shadow-sm border border-gray-100">All apps</span>
      <span class="bg-white/50 px-4 py-1.5 rounded-full text-sm text-gray-500 border border-gray-100">Productivity</span>
      <span class="bg-white/50 px-4 py-1.5 rounded-full text-sm text-gray-500 border border-gray-100">Games</span>
      <span class="bg-white/50 px-4 py-1.5 rounded-full text-sm text-gray-500 border border-gray-100">Tools</span>
    </div>

    <div id="loadingSkeletons" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 md:gap-6">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100/80"><div class="flex gap-4"><div class="shimmer w-16 h-16 rounded-xl"></div><div class="flex-1 space-y-2"><div class="shimmer h-5 w-3/4 rounded"></div><div class="shimmer h-3 w-1/2 rounded"></div></div></div></div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100/80 hidden sm:block"><div class="flex gap-4"><div class="shimmer w-16 h-16 rounded-xl"></div><div class="flex-1 space-y-2"><div class="shimmer h-5 w-3/4 rounded"></div><div class="shimmer h-3 w-1/2 rounded"></div></div></div></div>
    </div>

    <div id="appsGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 md:gap-6"></div>

    <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
      <div class="text-6xl mb-4">📭</div>
      <h3 class="text-xl font-semibold text-gray-700">No apps available</h3>
      <p class="text-gray-500 mt-1">Add data to your Google Sheet!</p>
    </div>

    <div id="noResults" class="hidden flex-col items-center justify-center py-16 text-center">
      <div class="text-6xl mb-4">🔍</div>
      <h3 class="text-xl font-semibold text-gray-700">No apps found</h3>
      <p class="text-gray-500 mt-1">Try a different search term</p>
    </div>

  </div>

  <script>
    // PASTE YOUR GOOGLE SCRIPT WEB APP URL HERE
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwCI1990UHR_q1TZSq7kqjGU3Ne6fADvk7Gxm_Ey-5pJvi-NY6E-K9AYUrlNuX0n6IH/exec";

    const grid = document.getElementById('appsGrid');
    const loadingSkeletons = document.getElementById('loadingSkeletons');
    const emptyState = document.getElementById('emptyState');
    const noResults = document.getElementById('noResults');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    
    let allApps = [];
    let filteredApps = [];
    
    function renderApps(appsToRender) {
      if (!appsToRender || appsToRender.length === 0) {
        grid.classList.add('hidden');
        noResults.classList.remove('hidden');
        emptyState.classList.add('hidden');
        return;
      }
      
      noResults.classList.add('hidden');
      emptyState.classList.add('hidden');
      grid.classList.remove('hidden');
      
      grid.innerHTML = '';
      
      appsToRender.forEach((app, index) => {
        // Skip empty rows from Google Sheet if any
        if(!app.name) return; 
        const card = createAppCard(app, index);
        grid.appendChild(card);
      });
    }
    
    function createAppCard(app, idx) {
      const card = document.createElement('div');
      card.className = 'app-card bg-white rounded-2xl p-5 shadow-md border border-gray-100/80 hover-lift flex flex-col h-full';
      card.style.animationDelay = `${idx * 0.03}s`;
      
      const name = app.name || 'Untitled';
      const category = app.category || 'App';
      const description = app.description || 'No description available.';
      
      // Setup icon with a reliable fallback
      let icon = app.icon ? app.icon.trim() : '';
      const fallbackIcon = `https://placehold.co/100x100/8b5cf6/ffffff?text=${encodeURIComponent(name.charAt(0))}`;
      if(!icon) icon = fallbackIcon;

      const appUrl = app.appUrl || '#';
      
      card.innerHTML = `
        <div class="flex items-start gap-4">
          <div class="relative flex-shrink-0">
            <img src="${icon}" alt="${name}" class="w-16 h-16 rounded-xl object-cover shadow-sm border border-gray-100" 
                 onerror="this.onerror=null; this.src='${fallbackIcon}';">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-lg leading-tight truncate text-gray-800" title="${name}">${name}</h3>
            <p class="text-sm text-purple-600 font-medium capitalize mt-1">${category}</p>
          </div>
        </div>
        <p class="text-sm text-gray-600 mt-4 line-clamp-2 leading-relaxed">${description}</p>
        <div class="mt-4 pt-3 border-t border-gray-100 flex justify-between items-center mt-auto">
          <span class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Web App</span>
          <a href="${appUrl}" target="_blank" rel="noopener noreferrer" 
             class="inline-flex items-center gap-1 text-sm font-semibold text-purple-700 hover:text-white transition-colors bg-purple-50 px-4 py-2 rounded-xl hover:bg-purple-600">
            Open App <span class="text-lg leading-4">↗</span>
          </a>
        </div>
      `;
      return card;
    }
    
    function filterApps(term) {
      const t = term.trim().toLowerCase();
      if (!t) {
        filteredApps = [...allApps];
      } else {
        filteredApps = allApps.filter(app => {
          return (app.name || '').toLowerCase().includes(t) ||
                 (app.description || '').toLowerCase().includes(t) ||
                 (app.category || '').toLowerCase().includes(t);
        });
      }
      
      if (filteredApps.length === 0 && allApps.length > 0) {
        grid.classList.add('hidden');
        noResults.classList.remove('hidden');
        emptyState.classList.add('hidden');
      } else {
        renderApps(filteredApps);
      }
      
      clearBtn.classList.toggle('hidden', !t);
    }
    
    // Fetch data from Google Sheets API
    async function loadAppsFromSheet() {
      try {
        const response = await fetch(GOOGLE_SHEET_API_URL);
        const data = await response.json();
        
        loadingSkeletons.classList.add('hidden');
        
        allApps = data;
        
        if (allApps.length === 0) {
          emptyState.classList.remove('hidden');
        } else {
          filteredApps = [...allApps];
          // Reverse array to show newest additions first
          renderApps(filteredApps.reverse());
        }
      } catch (error) {
        console.error('Failed to load from Google Sheets:', error);
        loadingSkeletons.classList.add('hidden');
        emptyState.classList.remove('hidden');
        emptyState.innerHTML = `<div class="text-6xl mb-4">⚠️</div><h3 class="text-xl font-semibold text-gray-700">Connection error</h3><p class="text-gray-500">Failed to connect to Google Sheets API</p>`;
      }
    }
    
    // Event Listeners
    searchInput.addEventListener('input', (e) => filterApps(e.target.value));
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      filterApps('');
      searchInput.focus();
    });

    // Start fetching when page loads
    loadAppsFromSheet();
  </script>
</body>
</html>
