<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SK M Track - Wealth & Dreams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-modern { background-color: #1e293b; border: 1px solid transparent; color: white; transition: all 0.3s ease; }
        .input-modern:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #a855f7); transition: opacity 0.2s ease; }
        .btn-gradient:active { opacity: 0.8; }
        .tab-active { border-bottom: 2px solid #a855f7; color: #f8fafc; }
        .tab-inactive { color: #64748b; }
        .progress-bar-fill { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center relative">

    <div id="app-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-sm hidden px-4">
        <div class="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl transform transition-all scale-95" id="modal-content">
            <h3 id="modal-title" class="text-xl font-bold mb-2 text-white">Notice</h3>
            <p id="modal-message" class="text-slate-300 text-sm mb-6">Message goes here.</p>
            <button id="btn-close-modal" class="btn-gradient w-full py-3 rounded-xl font-semibold text-sm">Got it</button>
        </div>
    </div>

    <div id="input-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-sm hidden px-4">
        <div class="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl transform transition-all scale-95" id="input-modal-content">
            <h3 id="input-modal-title" class="text-xl font-bold mb-2 text-white">Action Required</h3>
            <p id="input-modal-message" class="text-slate-300 text-sm mb-4">Enter value.</p>
            <input type="number" step="1" id="input-modal-value" class="input-modern w-full p-3.5 rounded-xl text-lg font-bold text-center mb-6" placeholder="₹ 0">
            <div class="flex gap-3">
                <button id="btn-cancel-input" class="w-full py-3 rounded-xl font-semibold text-sm bg-slate-800 text-slate-300">Cancel</button>
                <button id="btn-confirm-input" class="btn-gradient w-full py-3 rounded-xl font-semibold text-sm">Confirm</button>
            </div>
        </div>
    </div>

    <section id="auth-section" class="w-full h-screen flex flex-col justify-center px-6 max-w-md z-10 relative">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <span class="text-3xl font-bold">₹</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">SK M Track</h1>
            <p class="text-slate-400 text-sm mt-2">Track Spends. Fund Dreams.</p>
        </div>
        
        <form id="auth-form" class="space-y-4 glass-card p-6 rounded-3xl shadow-xl">
            <div>
                <input type="email" id="email" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="Email Address">
            </div>
            <div>
                <input type="password" id="password" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="Password">
            </div>
            <div class="pt-2 flex flex-col gap-3">
                <button type="submit" class="btn-gradient w-full py-3.5 rounded-xl font-semibold text-sm">Sign In</button>
                <button type="button" id="btn-signup" class="w-full py-3.5 rounded-xl font-semibold text-sm bg-slate-800 text-slate-300">Create Account</button>
            </div>
        </form>
    </section>

    <section id="dashboard-section" class="hidden w-full max-w-md min-h-screen flex flex-col pb-20 relative">
        
        <header class="sticky top-0 z-30 bg-[#020617]/90 backdrop-blur-md pt-10 pb-4 px-6 border-b border-slate-800/50">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <p class="text-xs font-medium text-slate-400" id="balance-label">Total Spends</p>
                    <h2 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400" id="total-balance">₹0</h2>
                </div>
                <button id="btn-logout" class="bg-slate-800/80 p-2.5 rounded-full text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
            
            <div class="flex w-full mt-2 border-b border-slate-800">
                <button id="tab-spends" class="flex-1 py-2 text-sm font-semibold tab-active transition-colors">Track Spends</button>
                <button id="tab-dreams" class="flex-1 py-2 text-sm font-semibold tab-inactive transition-colors">Dream Savings</button>
            </div>
        </header>

        <div id="view-spends" class="px-4 space-y-6 mt-6">
            <div class="glass-card rounded-3xl p-5 shadow-lg flex flex-col items-center justify-center">
                <div class="relative w-48 h-48 sm:w-56 sm:h-56"><canvas id="expenseChart"></canvas></div>
            </div>

            <div class="glass-card rounded-3xl p-5 shadow-lg">
                <h3 class="text-sm font-semibold mb-4 text-slate-200">Log Expense</h3>
                <form id="expense-form" class="space-y-4">
                    <div class="flex gap-3">
                        <div class="flex-1">
                            <input type="number" step="1" id="exp-amount" class="input-modern w-full p-3.5 rounded-xl text-sm font-semibold" required placeholder="₹ 0">
                        </div>
                        <div class="flex-1">
                            <select id="exp-category" class="input-modern w-full p-3.5 rounded-xl text-sm appearance-none">
                                <option value="Food">🍔 Food</option>
                                <option value="Transport">🚗 Transport</option>
                                <option value="Utilities">⚡ Utilities</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Custom">✏️ Custom...</option>
                            </select>
                        </div>
                    </div>
                    <input type="text" id="exp-custom-cat" class="input-modern w-full p-3.5 rounded-xl text-sm hidden" placeholder="Enter custom category...">
                    <input type="text" id="exp-desc" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="What did you pay for?">
                    <button type="submit" class="btn-gradient w-full py-3.5 rounded-xl font-semibold text-sm">Add Transaction</button>
                </form>
            </div>

            <div>
                <h3 class="text-sm font-semibold mb-3 px-2 text-slate-200">Recent Spends</h3>
                <div class="space-y-3" id="transaction-list"></div>
            </div>
        </div>

        <div id="view-dreams" class="hidden px-4 space-y-6 mt-6">
            
            <div class="rounded-3xl p-[1px] bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 shadow-lg shadow-purple-500/20">
                <div class="bg-[#0f172a] rounded-3xl p-5 h-full">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xl">🤖</span>
                        <h3 class="text-sm font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">AI Advisor</h3>
                    </div>
                    <p id="ai-tip-text" class="text-sm text-slate-300 leading-relaxed">Analyzing your financial goals...</p>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-5 shadow-lg">
                <h3 class="text-sm font-semibold mb-4 text-slate-200">Create a New Dream</h3>
                <form id="dream-form" class="space-y-4">
                    <input type="text" id="dream-name" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="E.g. Royal Enfield, Maldives Trip">
                    <div class="flex gap-3">
                        <input type="number" step="1" id="dream-target" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="Target ₹">
                        <input type="number" step="1" id="dream-saved" class="input-modern w-full p-3.5 rounded-xl text-sm" required placeholder="Already Saved ₹">
                    </div>
                    <select id="dream-category" class="input-modern w-full p-3.5 rounded-xl text-sm appearance-none">
                        <option value="Vehicle">🏍️ Vehicle</option>
                        <option value="Travel">✈️ Travel</option>
                        <option value="Tech">💻 Tech & Gadgets</option>
                        <option value="Real Estate">🏠 Real Estate</option>
                        <option value="Emergency">🛡️ Emergency Fund</option>
                    </select>
                    <button type="submit" class="btn-gradient w-full py-3.5 rounded-xl font-semibold text-sm">Save Dream Goal</button>
                </form>
            </div>

            <div>
                <h3 class="text-sm font-semibold mb-3 px-2 text-slate-200">Your Dreams</h3>
                <div class="space-y-4" id="dreams-list"></div>
            </div>
        </div>

    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
